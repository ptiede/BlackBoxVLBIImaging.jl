# Fitting strategy: optimizer, noise tempering, MCMC sampler, Reactant.

[optimizer]
method = "Adam"     # Adam | AdamW | LBFGS  (LBFGS is CPU-only; Reactant uses Adam/AdamW)
maxiters = 10000
ntrials = 5         # random restarts in the first (best_image) stage; CPU path only
g_tol = 0.1         # gradient tolerance for the CPU (comrade_opt) path
eta = 0.001         # learning rate for the Optimisers.jl rules (Adam/AdamW)

[tempering]
# One optimization round per entry; the value is the extra fractional noise added to the
# data for that round (0.0 = full data). Replaces the old hardcoded 3-stage schedule.
noise_schedule = [0.05, 0.025, 0.0]

[sampler]
nsample = 10000   # post-warmup samples to keep (drawn after `nadapt` warmup)
nadapt = 10000
step_size = 0.01
target_accept = 0.9
init_buffer = 200
term_buffer = 500
# reactant-only knobs:
max_tree_depth = 10
chunk_size = 100
base_window = 25

[run]
use_reactant = false
benchmark = true
sample_checkpoint = 0   # Reactant only: render a checkpoint (FITS + PNG + residuals) every N
                        # sampling samples (also the sampling disk stride). 0 disables it.
# start = "/path/to/start.jls"   # warm-start from a serialized parameter vector
